ingestion:
  source_glob: "docs/**/*.md"
  chunk_size: 400
  overlap: 40
  source_type: "documentation"
  canonical: true

index:
  mode: "keyword"
  scoring: "tf_idf"

query:
  default_top_k: 5
  max_top_k: 20
  enable_filters: true

evaluation:
  golden_query_count: 10
  stale_source_warn_days: 30
